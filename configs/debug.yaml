# Model Settings
model:
  default_provider: "qwen3"

  qwen3:
    model_name: "Qwen/Qwen3-30B-A3B-Instruct-2507"
    model_path: "/home/ai_researcher/.cache/modelscope/hub/models/Qwen/Qwen3-30B-A3B-Instruct-2507"

    # Global generation parameters
    max_length: 32768
    temperature: 0.7
    #top_p: 0.9
    #repetition_penalty: 1.1
  api_settings:
    base_url: "http://localhost:8001/v1"
    api_key: "EMPTY"

# Workspace Settings
workspace:
  base_dir: "/home/ai_researcher/projects/ai_researcher/workspace"


# Researcher Settings
researcher:
  workflow: "default"
  iterable: true
  
  task_parsing:
    mode: "basic"
    human_in_the_loop: true
    max_iterations: 3
  literature_review:
    mode: "basic"
    num_papers: 5
  hypothesis_construction:
    mode: "basic"
    max_debate_iterations: 5
  method_design:
    mode: "basic"
    max_debate_iterations: 5
  experiment_execution:
    mode: "basic"
    backend: "opencode"
    opencode:
      model_selector: "qwen-local//home/ai_researcher/.cache/modelscope/hub/models/Qwen/Qwen3-Coder-30B-A3B-Instruct" # from configs/opencode.json (provider_id/model_id)
      # model_selector: "openai-free/gpt-5.3-codex"
      # base_url: "http://127.0.0.1:4096"
    human_in_the_loop: true
    code_execution_timeout: 300  # seconds
    code_execution_retries: 5
    use_virtual_env: true
    virtual_env_path: "/home/ai_researcher/miniconda3/envs/ai_workspace"
  report_generation:
    mode: "detailed"
    skip_generation: False
    compiler_verification: False
    output_type: "markdown"
    include_references: False
    citations:
      api_key: ""  # Perplexity API key (leave empty if not using)
      max_paragraphs_per_section: 50  # Limit paragraphs per section for cost control
  review:
    mode: "basic"


  # Context Management Settings
  context_management:
    # Global context compression settings
    enable_compression: true
    compression_threshold: 0.7  # Compress when token count exceeds of max context (must be <= safety_margin)
    max_context_tokens: null  # Maximum context tokens (null = auto-infer from model)
    safety_margin: 0.9  # Safety margin for token limiting

    # Compression settings
    compression:
      enable_text_compression: true
      compression_params: {}  # Additional parameters for TextMessageCompressor

    # Token limiting settings
    token_limiting:
      enable_token_limiting: true

    # Message history settings
    message_history:
      enable_history_limiting: false
      max_messages: 10  # Maximum number of messages to keep
      keep_first_message: true